services:
  traefik:
    image: traefik:v3
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # 読み取り専用推奨
      - letsencrypt:/letsencrypt
    environment:
      - CLOUDFLARE_DNS_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Let's Encrypt 設定
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    networks:
      - traefik-network

  app:
    build: .
    environment:
      - OUTPUT_FOLDER=/data
    volumes:
      - ${OUTPUT_FOLDER:-./data}:/data
    labels:
      - "traefik.enable=true"

      # HTTP router
      - "traefik.http.routers.app-http.rule=Host(`${DOMAIN}`) || PathPrefix(`/`)"
      - "traefik.http.routers.app-http.entrypoints=web"
      - "traefik.http.routers.app-http.service=app"

      # HTTPS router
      - "traefik.http.routers.app-https.rule=Host(`${DOMAIN}`) || PathPrefix(`/`)"
      - "traefik.http.routers.app-https.entrypoints=websecure"
      - "traefik.http.routers.app-https.tls=true"
      - "traefik.http.routers.app-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.app-https.service=app"

      # Backend service
      - "traefik.http.services.app.loadbalancer.server.port=80"
    networks:
      - traefik-network

networks:
  traefik-network:
    driver: bridge

volumes:
  letsencrypt:
